<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sproutia</title>
<style>
  :root {
    --fg: #1f2d1f;
    --muted: #556b55;
    --accent: #3a8a4a;
    --bg: #fafcf8;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    line-height: 1.7;
  }
  main {
    max-width: 560px;
    text-align: center;
  }
  h1 {
    font-size: 2.5rem;
    margin: 0 0 0.5rem;
    color: var(--accent);
    letter-spacing: 0.02em;
  }
  .tagline {
    color: var(--muted);
    margin-bottom: 2rem;
  }
  nav a {
    color: var(--accent);
    text-decoration: none;
    margin: 0 0.75rem;
  }
  nav a:hover { text-decoration: underline; }
  footer {
    position: fixed;
    bottom: 1rem;
    color: var(--muted);
    font-size: 0.85rem;
  }
</style>
</head>
<body>
<main>
  <h1>Sproutia</h1>
  <p class="tagline">シンプルに、暮らしを整えるアプリを作っています。</p>
  <nav>
    <a href="/privacy/">プライバシーポリシー</a>
  </nav>
</main>
<footer>© Sproutia</footer>
</body>
</html>
